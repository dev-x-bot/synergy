  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d:rgba(141,254,31,.35);}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gut);}\n.eyebrow{\n  display:inline-flex;align-items:center;gap:9px;\n  font-size:12.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--lime-deep);\n}\n.eyebrow .tick{width:22px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--lime));}\n\nh1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-.02em;line-height:1.05;color:var(--ink);}\n.gradient-text{\n  background:linear-gradient(115deg,#e0a800 0%,var(--gold) 32%,var(--lime-deep) 100%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n}\n\n/* ---------- Buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--font-display);font-weight:600;font-size:15px;\n  padding:14px 26px;border-radius:100px;border:1px solid transparent;\n  transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,filter .18s,background .2s,color .2s,border-color .2s;\n  white-space:nowrap;\n}\n.btn svg{width:17px;height:17px;transition:transform .25s;}\n.btn-primary{\n  color:#16210a;background:linear-gradient(115deg,var(--gold),var(--lime));\n  box-shadow:0 10px 24px -10px rgba(141,254,31,.75);\n}\n.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 16px 30px -10px rgba(141,254,31,.85);}\n.btn-primary:hover svg{transform:translateX(3px);}\n.btn-ghost{color:var(--ink);background:transparent;border-color:var(--line);}\n.btn-ghost:hover{border-color:var(--ink);transform:translateY(-2px);}\n.btn-dark{color:#fff;background:var(--ink);}\n.btn-dark:hover{transform:translateY(-2px);background:var(--ink-2);box-shadow:var(--shadow-float);}\n.btn-dark:hover svg{transform:translateX(3px);}\n\n/* ---------- Header / Nav ---------- */\n.header{position:sticky;top:0;z-index:100;transition:background .3s,box-shadow .3s,border-color .3s;border-bottom:1px solid transparent;}\n.header.scrolled{background:rgba(251,252,248,.78);backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px);border-color:var(--line-soft);box-shadow:0 8px 30px -22px rgba(13,17,23,.4);}\n.nav{display:flex;align-items:center;gap:30px;height:78px;}\n.brand{display:flex;align-items:center;flex-shrink:0;}\n.brand img{height:34px;width:auto;}\n.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto;}\n.nav-item{position:relative;}\n.nav-link{\n  display:inline-flex;align-items:center;gap:6px;\n  font-size:15px;font-weight:500;color:var(--ink-soft);\n  padding:10px 14px;border-radius:10px;transition:color .2s,background .2s;\n}\n.nav-link:hover{color:var(--ink);background:var(--bg-2);}\n.nav-link .chev{width:13px;height:13px;transition:transform .25s;opacity:.6;}\n.nav-item:hover .nav-link .chev{transform:rotate(180deg);}\n\n/* dropdown */\n.dropdown{\n  position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(8px);\n  min-width:248px;background:var(--card);border:1px solid var(--line);border-radius:18px;\n  padding:8px;box-shadow:var(--shadow-float);\n  opacity:0;visibility:hidden;transition:opacity .22s,transform .22s,visibility .22s;\n}\n.nav-item:hover .dropdown,.nav-item:focus-within .dropdown{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}\n.dropdown a{\n  display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;\n  font-size:14.5px;font-weight:500;color:var(--ink-soft);transition:background .18s,color .18s;\n}\n.dropdown a:hover{background:var(--bg-2);color:var(--ink);}\n.dropdown a .di{\n  width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;\n  background:linear-gradient(135deg,rgba(252,204,1,.16),rgba(141,254,31,.18));\n  border:1px solid rgba(141,254,31,.30);color:var(--lime-deep);\n}\n.dropdown a .di svg{width:17px;height:17px;}\n.nav-cta{margin-left:8px;display:flex;align-items:center;gap:10px;}\n.hamburger{display:none;width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:var(--card);place-items:center;transition:background .2s,border-color .2s,box-shadow .2s;}\n.hamburger:hover{background:var(--bg-2);border-color:rgba(141,254,31,.5);}\n.hamburger:active{transform:scale(.96);}\n.hamburger .hb{display:flex;flex-direction:column;justify-content:center;gap:5px;width:22px;height:18px;}\n.hamburger .hb i{display:block;height:2.5px;width:100%;background:var(--ink);border-radius:3px;transform-origin:center;transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .2s;}\nbody.menu-open .hamburger{background:var(--ink);border-color:var(--ink);}\nbody.menu-open .hamburger .hb i{background:#fff;}\nbody.menu-open .hamburger .hb i:nth-child(1){transform:translateY(7.5px) rotate(45deg);}\nbody.menu-open .hamburger .hb i:nth-child(2){opacity:0;}\nbody.menu-open .hamburger .hb i:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}\n\n/* ---------- Hero ---------- */\n.hero{position:relative;padding:clamp(48px,8vw,96px) 0 clamp(60px,9vw,110px);overflow:hidden;}\n.ambient{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}\n.blob{position:absolute;border-radius:50%;filter:blur(120px);}\n.blob.gold{width:46vw;height:46vw;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);top:-26%;right:-10%;opacity:.30;animation:drift1 22s ease-in-out infinite;}\n.blob.lime{width:42vw;height:42vw;background:radial-gradient(circle,var(--lime) 0%,transparent 70%);bottom:-30%;left:-12%;opacity:.28;animation:drift2 26s ease-in-out infinite;}\n@keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-5%,6%) scale(1.08);}}\n@keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(6%,-5%) scale(1.1);}}\n.ambient .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(13,17,23,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(13,17,23,.03) 1px,transparent 1px);background-size:62px 62px;mask-image:radial-gradient(circle at 60% 35%,#000,transparent 72%);-webkit-mask-image:radial-gradient(circle at 60% 35%,#000,transparent 72%);}\n\n.hero-grid{position:relative;z-index:2;display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(32px,5vw,64px);align-items:center;}\n.hero h1{font-size:clamp(38px,5.6vw,66px);line-height:1.02;margin:22px 0 0;}\n.hero .lead{color:var(--slate);font-size:clamp(16px,1.5vw,19px);line-height:1.65;max-width:480px;margin:24px 0 0;}\n.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:34px;}\n.hero-trust{display:flex;align-items:center;gap:18px;margin-top:40px;color:var(--slate);font-size:14px;}\n.hero-trust .avatars{display:flex;}\n.hero-trust .avatars span{width:36px;height:36px;border-radius:50%;border:2px solid var(--bg);margin-left:-10px;background:linear-gradient(135deg,var(--bg-3),var(--bg-2));display:grid;place-items:center;font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ink-soft);}\n.hero-trust .avatars span:first-child{margin-left:0;}\n.hero-trust b{color:var(--ink);font-weight:600;}\n\n.badge{\n  display:inline-flex;align-items:center;gap:9px;white-space:nowrap;\n  font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--lime-deep);\n  padding:7px 15px;border-radius:100px;\n  background:linear-gradient(120deg,rgba(252,204,1,.16),rgba(141,254,31,.18));\n  border:1px solid rgba(141,254,31,.40);\n}\n.dot{width:7px;height:7px;border-radius:50%;background:var(--lime-deep);animation:pulse 2.2s infinite;}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,170,18,.5);}70%{box-shadow:0 0 0 8px rgba(76,170,18,0);}100%{box-shadow:0 0 0 0 rgba(76,170,18,0);}}\n\n/* hero visual */\n.hero-visual{position:relative;}\n.hero-visual::before{\n  content:\"\";position:absolute;inset:0;z-index:0;border-radius:28px;border:1px solid var(--line);\n  background:\n    radial-gradient(120% 90% at 82% 8%,rgba(252,204,1,.24),transparent 55%),\n    radial-gradient(110% 90% at 8% 100%,rgba(141,254,31,.26),transparent 55%),\n    linear-gradient(160deg,#ffffff,#f1f4ea);\n}\n.hero-visual image-slot{position:relative;z-index:1;width:100%;height:clamp(360px,42vw,500px);box-shadow:var(--shadow-card);}\n.hero-card{\n  position:absolute;left:-22px;bottom:30px;z-index:3;\n  display:flex;align-items:center;gap:14px;\n  background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 18px;\n  box-shadow:var(--shadow-float);\n}\n.hero-card .hc-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--lime));color:#16210a;}\n.hero-card .hc-ic svg{width:22px;height:22px;}\n.hero-card .hc-num{font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1;}\n.hero-card .hc-lbl{font-size:12.5px;color:var(--slate);margin-top:3px;}\n.hero-tag{\n  position:absolute;right:-14px;top:26px;z-index:3;\n  display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;\n  padding:10px 16px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:var(--shadow-float);\n}\n.hero-tag .pin{width:8px;height:8px;border-radius:50%;background:var(--lime);}\n\n/* ---------- Logo strip ---------- */\n.strip{padding:8px 0 8px;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);background:var(--bg-2);}\n.strip-inner{display:flex;align-items:center;gap:clamp(24px,5vw,64px);justify-content:center;flex-wrap:wrap;padding-block:22px;}\n.strip-inner .lbl{font-size:13px;color:var(--slate-dim);font-weight:500;letter-spacing:.04em;}\n.strip-inner .name{font-family:var(--font-display);font-weight:600;font-size:clamp(16px,2vw,20px);color:var(--ink-soft);opacity:.55;transition:opacity .2s;}\n.strip-inner .name:hover{opacity:.9;}\n\n/* ---------- Section scaffolding ---------- */\n.section{padding:clamp(64px,9vw,118px) 0;}\n.section-head{max-width:680px;}\n.section-head.center{margin:0 auto;text-align:center;}\n.section-head h2{font-size:clamp(30px,4.2vw,50px);margin:16px 0 0;}\n.section-head p{color:var(--slate);font-size:clamp(16px,1.4vw,18px);line-height:1.6;margin:16px 0 0;}\n.section-head.center .eyebrow{justify-content:center;}\n\n/* ---------- Intro band ---------- */\n.intro{background:var(--ink);color:#fff;position:relative;overflow:hidden;}\n.intro::before{content:\"\";position:absolute;width:40vw;height:40vw;border-radius:50%;background:radial-gradient(circle,rgba(141,254,31,.16),transparent 70%);top:-50%;right:-10%;filter:blur(40px);}\n.intro-grid{position:relative;display:grid;grid-template-columns:auto 1fr;gap:clamp(28px,5vw,72px);align-items:center;}\n.intro-grid .big{font-family:var(--font-display);font-weight:700;font-size:clamp(54px,9vw,108px);line-height:.9;background:linear-gradient(160deg,var(--gold),var(--lime));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;}\n.intro-grid p{font-size:clamp(19px,2.4vw,30px);line-height:1.4;font-family:var(--font-display);font-weight:300;letter-spacing:-.01em;color:#eef1f4;}\n.intro-grid p b{font-weight:600;color:#fff;}\n\n/* ---------- Expertise grid ---------- */\n.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px;}\n.exp-card{\n  position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);\n  padding:30px 28px 26px;overflow:hidden;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s;\n}\n.exp-card::after{content:\"\";position:absolute;top:0;left:24px;right:24px;height:3px;border-radius:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--lime),transparent);opacity:0;transition:opacity .3s;}\n.exp-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-card);border-color:transparent;}\n.exp-card:hover::after{opacity:1;}\n.exp-ic{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;margin-bottom:22px;background:linear-gradient(135deg,rgba(252,204,1,.18),rgba(141,254,31,.2));border:1px solid rgba(141,254,31,.30);color:var(--lime-deep);transition:transform .3s;}\n.exp-card:hover .exp-ic{transform:scale(1.06) rotate(-3deg);}\n.exp-ic svg{width:26px;height:26px;}\n.exp-card h3{font-size:21px;}\n.exp-card p{color:var(--slate);font-size:14.5px;line-height:1.6;margin-top:10px;}\n.exp-more{display:inline-flex;align-items:center;gap:7px;margin-top:18px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ink);transition:gap .2s;}\n.exp-more svg{width:15px;height:15px;transition:transform .2s;}\n.exp-card:hover .exp-more{gap:11px;}\n.exp-card:hover .exp-more svg{transform:translateX(2px);}\n\n/* ---------- CTA band ---------- */\n.cta-band{position:relative;}\n.cta-box{\n  position:relative;overflow:hidden;border-radius:36px;padding:clamp(40px,6vw,72px);\n  background:linear-gradient(120deg,#16210a 0%,#1d2b0f 55%,#15300c 100%);\n  display:flex;align-items:center;justify-content:space-between;gap:36px;flex-wrap:wrap;\n}\n.cta-box::before{content:\"\";position:absolute;width:50%;height:200%;top:-50%;right:-5%;background:radial-gradient(circle,rgba(141,254,31,.30),transparent 60%);}\n.cta-box .ct{position:relative;max-width:560px;}\n.cta-box h2{color:#fff;font-size:clamp(28px,3.6vw,44px);}\n.cta-box p{color:rgba(255,255,255,.72);font-size:17px;line-height:1.6;margin-top:14px;}\n.cta-box .ca{position:relative;display:flex;gap:14px;flex-wrap:wrap;}\n\n/* ---------- Case studies ---------- */\n.case-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;}\n.case-card{\n  display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);\n  border-radius:var(--radius);overflow:hidden;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;\n}\n.case-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-card);}\n.case-media{position:relative;overflow:hidden;background:linear-gradient(150deg,rgba(252,204,1,.16),rgba(141,254,31,.18));}\n.case-media image-slot{position:relative;z-index:1;width:100%;height:200px;border-radius:0;}\n.case-tag{position:absolute;top:14px;left:14px;z-index:4;white-space:nowrap;background:rgba(13,17,23,.82);backdrop-filter:blur(6px);color:#fff;font-size:11.5px;font-weight:600;letter-spacing:.04em;padding:6px 13px;border-radius:100px;}\n.case-body{padding:24px 24px 26px;display:flex;flex-direction:column;flex:1;}\n.case-body h3{font-size:19px;line-height:1.25;}\n.case-body p{color:var(--slate);font-size:14px;line-height:1.6;margin-top:10px;}\n.case-link{display:inline-flex;align-items:center;gap:8px;margin-top:auto;padding-top:20px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--lime-deep);transition:gap .2s;}\n.case-link svg{width:15px;height:15px;}\n.case-card:hover .case-link{gap:12px;}\n\n/* ---------- Stats ---------- */\n.stats{background:var(--bg-2);border-block:1px solid var(--line-soft);}\n.stats-grid{display:grid;grid-template-columns:1.2fr repeat(3,1fr);gap:clamp(24px,4vw,56px);align-items:center;}\n.stats-intro h2{font-size:clamp(26px,3vw,38px);}\n.stats-intro p{color:var(--slate);margin-top:14px;font-size:16px;line-height:1.6;}\n.stat .num{font-family:var(--font-display);font-weight:700;font-size:clamp(44px,5vw,64px);line-height:1;letter-spacing:-.03em;}\n.stat .num .suf{background:linear-gradient(120deg,var(--gold),var(--lime-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}\n.stat .lbl{margin-top:10px;font-size:15px;color:var(--slate);font-weight:500;}\n.stat{position:relative;padding-left:24px;}\n.stat::before{content:\"\";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px;background:linear-gradient(var(--gold),var(--lime));}\n\n/* ---------- Footer ---------- */\n.footer{background:var(--ink);color:rgba(255,255,255,.7);padding:clamp(56px,7vw,86px) 0 0;}\n.foot-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:clamp(32px,5vw,64px);padding-bottom:54px;border-bottom:1px solid rgba(255,255,255,.10);}\n.foot-brand .fmark{display:flex;align-items:center;gap:12px;margin-bottom:20px;}\n.foot-brand .fmark .fm-s{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--lime));color:#16210a;font-family:var(--font-display);font-weight:700;font-size:22px;}\n.foot-brand .fmark .ft{font-family:var(--font-display);font-weight:600;font-size:20px;color:#fff;line-height:1;}\n.foot-brand .fmark .ft small{display:block;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.5);font-weight:500;margin-top:4px;}\n.foot-brand p{font-size:14.5px;line-height:1.7;max-width:330px;}\n.foot-social{display:flex;gap:10px;margin-top:24px;}\n.foot-social a{width:40px;height:40px;display:grid;place-items:center;border-radius:11px;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.7);transition:.2s;}\n.foot-social a:hover{color:#16210a;background:linear-gradient(135deg,var(--gold),var(--lime));border-color:transparent;transform:translateY(-2px);}\n.foot-social svg{width:18px;height:18px;}\n.foot-col h4{color:#fff;font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px;font-weight:600;}\n.foot-col ul{list-style:none;display:flex;flex-direction:column;gap:12px;}\n.foot-col a{font-size:14.5px;color:rgba(255,255,255,.7);transition:color .2s;}\n.foot-col a:hover{color:var(--lime);}\n.foot-sub{font-size:14.5px;line-height:1.6;margin-bottom:18px;}\n.sub-form{display:flex;gap:8px;padding:6px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);transition:border-color .2s,box-shadow .2s;max-width:330px;}\n.sub-form:focus-within{border-color:rgba(141,254,31,.55);box-shadow:0 0 0 4px rgba(141,254,31,.14);}\n.sub-form input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--font-body);font-size:14px;padding:0 14px;}\n.sub-form input::placeholder{color:rgba(255,255,255,.4);}\n.sub-form button{border:none;width:42px;height:42px;border-ra
