<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Banking cloud migration">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1b2e"/><stop offset="1" stop-color="#16324c"/>
    </linearGradient>
    <linearGradient id="bacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCCC01"/><stop offset="1" stop-color="#8DFE1F"/>
    </linearGradient>
    <radialGradient id="bglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8DFE1F" stop-opacity=".4"/><stop offset="1" stop-color="#8DFE1F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="bgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="520" fill="url(#bbg)"/>
  <rect width="800" height="520" fill="url(#bgrid)"/>
  <circle cx="500" cy="160" r="220" fill="url(#bglow)"/>

  <!-- cloud -->
  <g transform="translate(360,70)">
    <path d="M70 150a64 64 0 010-128 86 86 0 01162-18 60 60 0 0118 146z" fill="#0f2236" stroke="url(#bacc)" stroke-width="4"/>
    <path d="M150 70v52M126 96h48" stroke="#8DFE1F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- upload arrows -->
  <g stroke="#8DFE1F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".9">
    <path d="M300 320v-70M300 250l-22 22M300 250l22 22"/>
    <path d="M400 340v-90M400 250l-22 22M400 250l22 22"/>
    <path d="M500 320v-70M500 250l-22 22M500 250l22 22"/>
  </g>

  <!-- bank building -->
  <g transform="translate(290,330)">
    <rect x="-10" y="150" width="240" height="16" rx="6" fill="url(#bacc)"/>
    <path d="M110 0L226 56H-6z" fill="#13314b" stroke="#ffffff" stroke-opacity=".3" stroke-width="2.5"/>
    <g fill="#0f2236" stroke="#ffffff" stroke-opacity=".3" stroke-width="2.5">
      <rect x="6" y="66" width="22" height="80"/><rect x="50" y="66" width="22" height="80"/>
      <rect x="94" y="66" width="22" height="80"/><rect x="138" y="66" width="22" height="80"/>
      <rect x="182" y="66" width="22" height="80"/>
    </g>
    <circle cx="110" cy="34" r="9" fill="#FCCC01"/>
  </g>

  <!-- secure chip -->
  <g transform="translate(120,150)">
    <rect width="150" height="110" rx="16" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".12"/>
    <path d="M75 26l34 13v22c0 21-15 32-34 38-19-6-34-17-34-38V39z" fill="none" stroke="url(#bacc)" stroke-width="3.5"/>
    <path d="M60 60l11 11 20-22" fill="none" stroke="#8DFE1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
