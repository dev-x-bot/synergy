<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Digital transformation in retail">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1b2e"/><stop offset="1" stop-color="#16324c"/>
    </linearGradient>
    <linearGradient id="racc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCCC01"/><stop offset="1" stop-color="#8DFE1F"/>
    </linearGradient>
    <radialGradient id="rglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FCCC01" stop-opacity=".4"/><stop offset="1" stop-color="#FCCC01" stop-opacity="0"/>
    </radialGradient>
    <pattern id="rgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="520" fill="url(#rbg)"/>
  <rect width="800" height="520" fill="url(#rgrid)"/>
  <circle cx="220" cy="380" r="220" fill="url(#rglow)"/>

  <!-- phone with product cards -->
  <g transform="translate(110,90)">
    <rect width="220" height="340" rx="30" fill="#0f2236" stroke="#ffffff" stroke-opacity=".18" stroke-width="2.5"/>
    <rect x="74" y="16" width="72" height="10" rx="5" fill="#ffffff" fill-opacity=".18"/>
    <rect x="20" y="44" width="180" height="86" rx="14" fill="#13314b"/>
    <circle cx="52" cy="87" r="20" fill="none" stroke="url(#racc)" stroke-width="3"/>
    <rect x="86" y="70" width="96" height="10" rx="5" fill="#ffffff" fill-opacity=".5"/>
    <rect x="86" y="92" width="70" height="9" rx="4.5" fill="#ffffff" fill-opacity=".25"/>
    <rect x="20" y="146" width="84" height="84" rx="14" fill="#13314b"/>
    <rect x="116" y="146" width="84" height="84" rx="14" fill="#13314b"/>
    <path d="M40 196l12 12 22-26" fill="none" stroke="#8DFE1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="20" y="250" width="180" height="44" rx="12" fill="url(#racc)"/>
    <rect x="64" y="266" width="92" height="12" rx="6" fill="#0c1b2e" fill-opacity=".75"/>
  </g>

  <!-- conversion trend card -->
  <g transform="translate(380,120)">
    <rect width="300" height="180" rx="18" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".12"/>
    <text x="24" y="44" font-family="Sora,system-ui,sans-serif" font-size="15" fill="#9fb0c2">Conversion</text>
    <text x="24" y="86" font-family="Sora,system-ui,sans-serif" font-weight="700" font-size="40" fill="#8DFE1F">+38%</text>
    <polyline points="24,150 78,128 132,138 186,96 240,104 276,60" fill="none" stroke="url(#racc)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="276" cy="60" r="6" fill="#FCCC01"/>
  </g>

  <!-- sparkle / personalization -->
  <g transform="translate(470,330)" stroke="#FCCC01" stroke-width="4" stroke-linecap="round">
    <path d="M60 0v34M60 86v34M0 60h34M86 60h34"/>
    <path d="M60 30l8 22 22 8-22 8-8 22-8-22-22-8 22-8z" fill="#8DFE1F" stroke="none"/>
  </g>
  <g transform="translate(610,360)" stroke="#8DFE1F" stroke-width="3.5" stroke-linecap="round" opacity=".8">
    <path d="M30 0v18M30 42v18M0 30h18M42 30h18"/>
  </g>
</svg>
