<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600" role="img" aria-label="Global delivery and teams">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1a2c"/><stop offset="1" stop-color="#17344f"/>
    </linearGradient>
    <linearGradient id="hacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCCC01"/><stop offset="1" stop-color="#8DFE1F"/>
    </linearGradient>
    <radialGradient id="hglow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#8DFE1F" stop-opacity=".35"/><stop offset="1" stop-color="#8DFE1F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hgrid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="760" height="600" fill="url(#hbg)"/>
  <rect width="760" height="600" fill="url(#hgrid)"/>
  <circle cx="380" cy="280" r="280" fill="url(#hglow)"/>

  <!-- globe -->
  <g transform="translate(380,290)" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="2">
    <circle r="150" stroke="url(#hacc)" stroke-opacity="1" stroke-width="2.5"/>
    <ellipse rx="150" ry="56"/><ellipse rx="150" ry="110"/>
    <ellipse rx="56" ry="150"/><ellipse rx="110" ry="150"/>
    <line x1="-150" y1="0" x2="150" y2="0"/>
  </g>
  <!-- delivery hubs -->
  <g>
    <g><circle cx="300" cy="200" r="7" fill="#8DFE1F"/><circle cx="300" cy="200" r="15" fill="none" stroke="#8DFE1F" stroke-opacity=".5" stroke-width="2"/></g>
    <g><circle cx="470" cy="250" r="7" fill="#FCCC01"/><circle cx="470" cy="250" r="15" fill="none" stroke="#FCCC01" stroke-opacity=".5" stroke-width="2"/></g>
    <g><circle cx="330" cy="380" r="7" fill="#8DFE1F"/><circle cx="330" cy="380" r="15" fill="none" stroke="#8DFE1F" stroke-opacity=".5" stroke-width="2"/></g>
    <g><circle cx="455" cy="360" r="7" fill="#FCCC01"/></g>
    <path d="M300 200Q400 180 470 250" fill="none" stroke="url(#hacc)" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>
    <path d="M470 250Q420 330 330 380" fill="none" stroke="url(#hacc)" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>
  </g>

  <!-- floating chart card -->
  <g transform="translate(70,90)">
    <rect width="190" height="130" rx="18" fill="#ffffff" fill-opacity=".07" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="20" y="20" width="80" height="9" rx="4.5" fill="#ffffff" fill-opacity=".4"/>
    <g>
      <rect x="22" y="96" width="22" height="16" rx="4" fill="#FCCC01"/>
      <rect x="56" y="78" width="22" height="34" rx="4" fill="#8DFE1F"/>
      <rect x="90" y="60" width="22" height="52" rx="4" fill="#FCCC01"/>
      <rect x="124" y="44" width="22" height="68" rx="4" fill="#8DFE1F"/>
    </g>
  </g>

  <!-- avatars / team card -->
  <g transform="translate(500,430)">
    <rect width="200" height="96" rx="18" fill="#ffffff" fill-opacity=".07" stroke="#ffffff" stroke-opacity=".14"/>
    <g stroke="#0b1a2c" stroke-width="3">
      <circle cx="44" cy="48" r="20" fill="#FCCC01"/>
      <circle cx="76" cy="48" r="20" fill="#8DFE1F"/>
      <circle cx="108" cy="48" r="20" fill="#3a6ea5"/>
    </g>
    <circle cx="140" cy="48" r="20" fill="#13314b" stroke="#ffffff" stroke-opacity=".25" stroke-width="2"/>
    <text x="140" y="54" text-anchor="middle" font-family="Sora,system-ui,sans-serif" font-size="16" fill="#cfe0ee">+40</text>
  </g>

  <!-- success pill -->
  <g transform="translate(80,440)">
    <rect width="150" height="70" rx="16" fill="#ffffff" fill-opacity=".07" stroke="#ffffff" stroke-opacity=".14"/>
    <circle cx="38" cy="35" r="18" fill="none" stroke="url(#hacc)" stroke-width="3"/>
    <path d="M28 35l7 8 13-15" fill="none" stroke="#8DFE1F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="68" y="22" width="62" height="10" rx="5" fill="#ffffff" fill-opacity=".5"/>
    <rect x="68" y="40" width="42" height="8" rx="4" fill="#ffffff" fill-opacity=".25"/>
  </g>
</svg>
